<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>橢球 Texture Mapping v6 — 部分球面 · 正確鏡像</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06060e;color:#fff;font-family:Arial,sans-serif;overflow:hidden;}
#app{width:100vw;height:100vh;position:relative;}
canvas#glc{width:100%;height:100%;display:block;}
#ctrl{
  position:absolute;top:0;left:0;right:0;
  background:rgba(4,5,16,0.92);border-bottom:1px solid rgba(60,110,220,0.20);
  padding:8px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;
}
.cg{display:flex;align-items:center;gap:6px;}
.cg label{font-size:11px;color:rgba(145,185,255,0.75);white-space:nowrap;}
.cg input[type=range]{width:96px;accent-color:#4488ff;}
.cg .v{font-size:12px;color:#fff;min-width:32px;}
.pb{display:flex;gap:5px;flex-wrap:wrap;}
.pb button{
  font-size:10px;padding:4px 8px;
  background:rgba(28,48,108,0.70);border:1px solid rgba(65,108,200,0.50);
  color:rgba(165,200,255,0.88);border-radius:4px;cursor:pointer;
}
.pb button:hover{background:rgba(48,78,168,0.80);}
#info{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(3,4,14,0.88);border-top:1px solid rgba(60,110,220,0.14);
  padding:7px 14px;font-size:11px;color:rgba(125,170,220,0.78);
}
#hint{position:absolute;top:52px;right:12px;font-size:10px;color:rgba(90,130,200,0.50);}
</style>
</head>
<body>
<div id="app">
  <canvas id="glc"></canvas>
  <div id="ctrl">
    <div class="cg"><label>水平 a</label>
      <input type="range" id="sa" min="0.3" max="4" value="1.4" step="0.05" oninput="upd()">
      <span class="v" id="va">1.4</span></div>
    <div class="cg"><label>垂直 b</label>
      <input type="range" id="sb" min="0.3" max="4" value="1.0" step="0.05" oninput="upd()">
      <span class="v" id="vb">1.0</span></div>
    <div class="cg"><label>深度 c</label>
      <input type="range" id="sc" min="0.3" max="4" value="1.2" step="0.05" oninput="upd()">
      <span class="v" id="vc">1.2</span></div>
    <div class="cg"><label>視野角 FOV</label>
      <input type="range" id="sf" min="20" max="90" value="45" step="1" oninput="upd()">
      <span class="v" id="vf">45°</span></div>
    <div class="cg"><label>視窗圓角</label>
      <input type="range" id="sr" min="0" max="60" value="16" step="1" oninput="upd()">
      <span class="v" id="vr">16</span></div>
    <div class="pb">
      <button onclick="pre(0.5,0.35,0.4,45,8)">極端弧形</button>
      <button onclick="pre(1.4,1.0,1.2,45,16)">AR 最佳</button>
      <button onclick="pre(1.4,1.0,0.5,45,16)">淺景深</button>
      <button onclick="pre(1.4,1.0,3.5,45,16)">深景深</button>
      <button onclick="pre(3.5,3.5,3.5,45,4)">近似平面</button>
      <button onclick="pre(1.4,1.0,1.2,45,0)">直角視窗</button>
      <button onclick="pre(1.4,1.0,1.2,45,58)">Pill 視窗</button>
    </div>
  </div>
  <div id="hint">拖曳旋轉環視 · 滾輪調整 FOV</div>
  <div id="info">AR 最佳曲率 · 拖曳旋轉在橢球內部環視</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas=document.getElementById('glc');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x06060e,1);

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(52,1,0.001,100);
cam.position.set(0,0,0);
cam.lookAt(0,0,1);

let A=1.4,B=1.0,C=1.2,FOVDEG=45,RAD=16;

// ── UI Texture ───────────────────────────────────────────
const TW=2048,TH=1280;
const uiCvs=document.createElement('canvas');
uiCvs.width=TW;uiCvs.height=TH;
const uc=uiCvs.getContext('2d');
const tex=new THREE.CanvasTexture(uiCvs);

// 修正水平翻轉：BackSide 使 U 方向鏡像，用 repeat.x=-1 補正
tex.wrapS=THREE.RepeatWrapping;
tex.repeat.set(-1,1);   // 水平鏡像，補正 BackSide 翻轉
tex.offset.set(1,0);    // repeat=-1 時需要 offset=1 讓 UV 回到 [0,1]

// ── 部分球面幾何體 ───────────────────────────────────────
// 只建立正前方 ±FOV 範圍的球面扇形
// Three.js SphereGeometry 參數：
//   phiStart = -FOV（水平起始，以 +Z 為 φ=π/2）
//   phiLength = 2*FOV（水平跨度）
//   thetaStart = π/2 - FOV_V（垂直起始）
//   thetaLength = 2*FOV_V（垂直跨度）
let mesh=null;

function buildMesh(){
  if(mesh){scene.remove(mesh);mesh.geometry.dispose();mesh.material.dispose();}

  const fovRad=FOVDEG*Math.PI/180;
  const fovV=fovRad*0.7; // 垂直 FOV 略小（16:10 比例）

  // SphereGeometry(r, widthSeg, heightSeg, phiStart, phiLength, thetaStart, thetaLength)
  // Three.js 的 phi 是從 +X 軸開始，繞 Y 軸。
  // 正前方是 +Z = phi=π/2。所以 phiStart = π/2 - fovRad
  const geo=new THREE.SphereGeometry(
    1,              // 半徑
    64, 40,         // 解析度
    Math.PI/2 - fovRad,   // phiStart：正前方 -FOV
    fovRad*2,             // phiLength：±FOV 範圍
    Math.PI/2 - fovV,     // thetaStart：垂直起始
    fovV*2                // thetaLength：垂直範圍
  );

  const mat=new THREE.MeshBasicMaterial({
    map:tex,
    side:THREE.BackSide,
    transparent:true,
    opacity:1,
  });

  mesh=new THREE.Mesh(geo,mat);
  mesh.scale.set(A,B,C);
  scene.add(mesh);
}

// ── 繪製 UI Texture ──────────────────────────────────────
const ITEMS=[
  {icon:'🔋',label:'電量',col:'#4caf50'},
  {icon:'🎤',label:'語音',col:'#2196f3'},
  {icon:'📷',label:'相機',col:'#9c27b0'},
  {icon:'🗺️',label:'地圖',col:'#ff9800'},
  {icon:'⏰',label:'時間',col:'#00bcd4'},
  {icon:'📡',label:'連線',col:'#8bc34a'},
];
const ANCH=[
  {u:0.10,v:0.82,lines:['2026.04.26','16:42'],  col:'#7ec8e3'},
  {u:0.90,v:0.82,lines:['🔋 78%','5G ◉'],       col:'#4caf50'},
  {u:0.10,v:0.18,lines:['📍 南屯區','↑ 230m'],  col:'#ff9800'},
  {u:0.90,v:0.18,lines:['就緒','通知×3'],        col:'#9c27b0'},
];

function rr(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawUI(){
  uc.clearRect(0,0,TW,TH);
  uc.fillStyle='rgba(5,7,20,0.55)';
  uc.fillRect(0,0,TW,TH);

  // 格線
  uc.strokeStyle='rgba(65,105,200,0.10)';uc.lineWidth=1;
  for(let i=0;i<=16;i++){const x=TW*i/16;uc.beginPath();uc.moveTo(x,0);uc.lineTo(x,TH);uc.stroke();}
  for(let j=0;j<=10;j++){const y=TH*j/10;uc.beginPath();uc.moveTo(0,y);uc.lineTo(TW,y);uc.stroke();}

  const CX=TW*0.5,CY=TH*0.5;

  // ── 應用程式視窗（中央）────────────────────────────────
  const WW=TW*0.52,WH=TH*0.52;
  const WX=CX-WW/2,WY=CY-WH/2;
  const WR=RAD*3.5;
  const HDR=WH*0.155;

  uc.fillStyle='rgba(4,7,22,0.93)';
  rr(uc,WX,WY,WW,WH,WR);uc.fill();

  uc.strokeStyle='rgba(75,140,255,0.85)';uc.lineWidth=3.5;
  rr(uc,WX,WY,WW,WH,WR);uc.stroke();

  // 標題列
  uc.fillStyle='rgba(22,52,158,0.90)';
  uc.beginPath();
  uc.moveTo(WX+WR,WY);
  uc.lineTo(WX+WW-WR,WY);uc.arcTo(WX+WW,WY,WX+WW,WY+WR,WR);
  uc.lineTo(WX+WW,WY+HDR);uc.lineTo(WX,WY+HDR);
  uc.lineTo(WX,WY+WR);uc.arcTo(WX,WY,WX+WR,WY,WR);
  uc.closePath();uc.fill();

  uc.font='bold 52px Arial';
  uc.fillStyle='rgba(200,225,255,0.95)';
  uc.textAlign='center';uc.textBaseline='middle';
  uc.fillText('🗺️  導航面板',CX,WY+HDR/2);

  uc.strokeStyle='rgba(75,140,255,0.28)';uc.lineWidth=1.5;
  uc.beginPath();uc.moveTo(WX+18,WY+HDR);uc.lineTo(WX+WW-18,WY+HDR);uc.stroke();

  const ROWS=[
    {t:'目的地：台中國立美術館',   col:'rgba(220,235,255,0.92)',sz:43,b:true},
    {t:'距離 2.4km · 步行 28分',   col:'rgba(150,192,248,0.80)',sz:37,b:false},
    {t:'預計到達：17:08',           col:'rgba(150,192,248,0.80)',sz:37,b:false},
    {t:'▸ 右轉中港路，步行 150m',  col:'rgba(65,210,135,0.92)', sz:39,b:false},
    {t:'▸ 左轉台灣大道，800m',     col:'rgba(125,182,248,0.62)',sz:35,b:false},
  ];
  const cH=WH-HDR-18;
  ROWS.forEach((r,i)=>{
    const ty=WY+HDR+14+cH*(i+0.5)/ROWS.length;
    uc.font=`${r.b?'bold ':' '}${r.sz}px Arial`;
    uc.fillStyle=r.col;uc.textAlign='center';uc.textBaseline='middle';
    uc.fillText(r.t,CX,ty);
  });

  // ── 極座標環形 UI ─────────────────────────────────────
  const RX=TW*0.43,RY=TH*0.43;
  const N=ITEMS.length;
  ITEMS.forEach((item,i)=>{
    const angle=(Math.PI*2/N)*i-Math.PI/2;
    const px=CX+RX*Math.cos(angle);
    const py=CY+RY*Math.sin(angle);
    const r=66;

    const gw=uc.createRadialGradient(px,py,r*0.2,px,py,r*1.9);
    gw.addColorStop(0,item.col+'88');gw.addColorStop(1,item.col+'00');
    uc.fillStyle=gw;uc.beginPath();uc.arc(px,py,r*1.9,0,Math.PI*2);uc.fill();

    uc.fillStyle='rgba(2,5,18,0.86)';
    uc.beginPath();uc.arc(px,py,r,0,Math.PI*2);uc.fill();
    uc.strokeStyle=item.col;uc.lineWidth=4;
    uc.beginPath();uc.arc(px,py,r,0,Math.PI*2);uc.stroke();

    uc.font='48px Arial';
    uc.textAlign='center';uc.textBaseline='middle';uc.fillStyle='#fff';
    uc.fillText(item.icon,px,py-r*0.1);
    uc.font='26px Arial';uc.fillStyle='rgba(200,220,245,0.82)';
    uc.fillText(item.label,px,py+r*0.56);
  });

  uc.strokeStyle='rgba(95,150,255,0.10)';uc.lineWidth=2;uc.setLineDash([8,20]);
  uc.beginPath();uc.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);uc.stroke();
  uc.setLineDash([]);

  // ── 角落錨點 ──────────────────────────────────────────
  ANCH.forEach(a=>{
    const px=TW*a.u,py=TH*(1-a.v);
    const fs=35,lh=48,bw=280,bh=lh*a.lines.length+26;
    const pr=bh/2;
    const bx=a.u>0.5?px-bw-8:px+8,by=py-bh/2;

    uc.fillStyle='rgba(2,5,18,0.84)';
    rr(uc,bx,by,bw,bh,pr);uc.fill();
    uc.strokeStyle=a.col+'88';uc.lineWidth=2;
    rr(uc,bx,by,bw,bh,pr);uc.stroke();
    uc.fillStyle=a.col+'66';
    uc.beginPath();uc.arc(bx+pr,by+bh/2,pr,0,Math.PI*2);uc.fill();

    a.lines.forEach((line,li)=>{
      uc.font=`${li===0?'bold ':' '}${fs}px Arial`;
      uc.fillStyle=li===0?'#fff':'rgba(165,202,228,0.82)';
      uc.textAlign='left';uc.textBaseline='middle';
      uc.fillText(line,bx+pr*2+6,by+24+lh*(li+0.5)-lh*0.18);
    });
  });

  // 凝視點
  uc.strokeStyle='rgba(255,255,255,0.24)';uc.lineWidth=2.5;
  const cl=26;
  uc.beginPath();
  uc.moveTo(CX-cl,CY);uc.lineTo(CX+cl,CY);
  uc.moveTo(CX,CY-cl);uc.lineTo(CX,CY+cl);
  uc.stroke();
  uc.beginPath();uc.arc(CX,CY,5,0,Math.PI*2);
  uc.fillStyle='rgba(255,255,255,0.30)';uc.fill();

  tex.needsUpdate=true;
}

// ── 拖曳旋轉 ────────────────────────────────────────────
let drag=false,lx=0,ly=0,yaw=0,pitch=0;
function applyRot(){
  const tx=Math.sin(yaw)*Math.cos(pitch);
  const ty=Math.sin(pitch);
  const tz=Math.cos(yaw)*Math.cos(pitch);
  cam.lookAt(tx,ty,tz);
}
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  yaw+=(e.clientX-lx)*0.004;pitch+=(e.clientY-ly)*0.004;
  pitch=Math.max(-0.7,Math.min(0.7,pitch));
  lx=e.clientX;ly=e.clientY;applyRot();
});
canvas.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{
  if(!drag)return;
  yaw+=(e.touches[0].clientX-lx)*0.004;pitch+=(e.touches[0].clientY-ly)*0.004;
  pitch=Math.max(-0.7,Math.min(0.7,pitch));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;applyRot();
},{passive:true});

// 滾輪調 FOV
canvas.addEventListener('wheel',e=>{
  FOVDEG=Math.max(20,Math.min(90,FOVDEG+e.deltaY*0.05));
  document.getElementById('sf').value=FOVDEG;
  document.getElementById('vf').textContent=Math.round(FOVDEG)+'°';
  rebuildMeshOnly();
},{passive:true});

// ── resize ──────────────────────────────────────────────
function resize(){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  renderer.setSize(w,h,false);
  cam.aspect=w/h;cam.updateProjectionMatrix();
}
window.addEventListener('resize',resize);resize();

// ── update ──────────────────────────────────────────────
function desc(a,b,c,fov,r){
  const d=c<0.6?'深度強烈：視窗貼近，VR 包覆感。':
           c<1.5?'深度適中：清晰空間彎曲，AR 感知。':
           c<3?  '深度輕微：類大型曲面螢幕。':
                 '近似平面：橢球退化為平面。';
  const f=`視野範圍 ±${fov}°。`;
  const cr=r===0?'直角邊框：幾何衝突。':r<12?'輕微圓角。':r<30?'適中圓角。':'Pill：橢圓 principle。';
  return `${d}  ${f}  ${cr}  ·  拖曳旋轉 · 滾輪調視野角`;
}

function rebuildMeshOnly(){
  buildMesh();
}

function upd(){
  A=parseFloat(document.getElementById('sa').value);
  B=parseFloat(document.getElementById('sb').value);
  C=parseFloat(document.getElementById('sc').value);
  FOVDEG=parseInt(document.getElementById('sf').value);
  RAD=parseInt(document.getElementById('sr').value);
  document.getElementById('va').textContent=A.toFixed(1);
  document.getElementById('vb').textContent=B.toFixed(1);
  document.getElementById('vc').textContent=C.toFixed(1);
  document.getElementById('vf').textContent=FOVDEG+'°';
  document.getElementById('vr').textContent=RAD;
  document.getElementById('info').textContent=desc(A,B,C,FOVDEG,RAD);
  drawUI();
  buildMesh();
}

function pre(a,b,c,f,r){
  document.getElementById('sa').value=a;
  document.getElementById('sb').value=b;
  document.getElementById('sc').value=c;
  document.getElementById('sf').value=f;
  document.getElementById('sr').value=r;
  upd();
}
// ── 神經網路橋接：WebSocket 接收器與平滑過渡 (Lerp) ───────────
let currentZDepth = 0.0;
let isTriggered = false;

// 新增：目標縮放值，作為 UI 滑順過渡的錨點
let targetA = A, targetB = B, targetC = C;

function connectSensoryNode() {
    const ws = new WebSocket('ws://localhost:8765');
    
    ws.onopen = () => {
        console.log("🟢 已成功連接 NeoWalker 感官節點！");
        document.getElementById('info').textContent = "🟢 神經橋接已連線！等待手勢數據...";
        document.getElementById('info').style.color = '#4caf50';
    };
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        currentZDepth = data.relative_depth;
        isTriggered = data.is_trigger;
        
        // 【防爆盾】鉗制 (Clamp) Z軸數據，避免手太靠近鏡頭導致數值暴衝
        let safeDepth = Math.min(Math.abs(currentZDepth), 0.35);
        
        if (isTriggered) {
            // 【觸發態】適度放大，係數調降，避免畫面撐破
            targetA = A * 1.10;
            targetB = B * 1.10;
            targetC = C * 0.85;
            document.getElementById('info').textContent = `[觸發] 深度: ${currentZDepth.toFixed(4)}`;
            document.getElementById('info').style.color = '#ff4444';
        } else {
            // 【待機/微調態】大幅降低影響係數 (從 0.8 降為 0.25)，創造細膩的呼吸感
            let hoverOffset = Math.max(0, (safeDepth - 0.05) * 0.25); 
            targetA = A + hoverOffset;
            targetB = B + hoverOffset;
            targetC = C - hoverOffset * 0.2;
            
            document.getElementById('info').textContent = `[待機] 深度: ${currentZDepth.toFixed(4)}`;
            document.getElementById('info').style.color = 'rgba(125,170,220,0.78)';
        }
    };
    
    ws.onclose = () => {
        console.log("🔴 感官節點斷線，5秒後嘗試重連...");
        document.getElementById('info').textContent = "🔴 神經橋接斷線，尋找訊號中...";
        document.getElementById('info').style.color = '#ff9800';
        setTimeout(connectSensoryNode, 5000);
    };
}

// 啟動接收器
connectSensoryNode();

// ── 覆蓋原本的 animate 函數，加入 LERP 引擎 ────────────────────
function animate(){
    requestAnimationFrame(animate);
    
    if (mesh) {
        // LERP 平滑插值邏輯：每次畫面更新時，當前尺寸只會朝「目標尺寸」靠近 15%
        // 這會完全消除感測器的物理抖動，呈現極度滑順的「磁吸/跟隨」視覺效果
        mesh.scale.x += (targetA - mesh.scale.x) * 0.15;
        mesh.scale.y += (targetB - mesh.scale.y) * 0.15;
        mesh.scale.z += (targetC - mesh.scale.z) * 0.15;
    }
    
    renderer.render(scene,cam);
}
animate();
</script>
</body>
</html>
